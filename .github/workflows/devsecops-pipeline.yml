name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  software-composition-analysis:
    name: SCA Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'app/'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Configured as 0 to log vulnerabilities without blocking the initial build

  container-security:
    name: Docker Image Hardening Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Local Docker Image
        run: |
          cd app
          docker build -t devsecops-lab-app:test .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-lab-app:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Keeps pipeline green for review, change to '1' to enforce blockage later
